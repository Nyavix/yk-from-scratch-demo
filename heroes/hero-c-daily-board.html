<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="From Scratch Bakeshop & Boba — handmade Japanese breads, banh mì, croissants, and bubble tea in Yellowknife. Open daily at Centre Square Mall.">
  <title>From Scratch Bakeshop & Boba · Yellowknife</title>

  <!-- Brand tokens -->
  <link rel="stylesheet" href="../css/tokens.css">

  <!-- Google Fonts: Poppins 600/700, Inter 400/500 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset & base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--brand-cream);
      color: var(--brand-ink);
      font-family: var(--font-body);
      font-size: var(--text-body);
      line-height: var(--leading-body);
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ─── Sticky nav ─── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--brand-paper);
      border-bottom: 1px solid rgba(240, 168, 180, 0.25);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-6);
      gap: var(--space-4);
    }

    .nav-logo {
      height: 44px;
      width: auto;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: var(--space-6);
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.9375rem;
      color: var(--brand-ink-60);
      transition: color 150ms ease-out;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: var(--brand-ink);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--brand-amber);
      color: var(--brand-paper) !important;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: 0.04em;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-pill);
      min-height: 44px;
      transition: background 150ms ease-out, transform 150ms ease-out;
    }

    .nav-cta:hover,
    .nav-cta:focus-visible {
      background: var(--brand-amber-deep);
      transform: scale(1.02);
    }

    .nav-cta:active { transform: scale(0.98); }

    /* hide text links on very small screens, keep CTA */
    @media (max-width: 480px) {
      .nav-links li:not(:last-child) { display: none; }
    }

    /* ─── Hero section ─── */
    .hero {
      background: var(--brand-cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: var(--space-12) var(--space-6) var(--space-8);
      gap: 0;
    }

    /* Logo */
    .hero-logo {
      width: clamp(110px, 30vw, 150px);
      height: auto;
      margin-bottom: var(--space-8);
      opacity: 0;
      transform: translateY(14px);
    }

    /* H1 */
    .hero-h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2.1rem, 6vw + 1rem, 3.5rem);
      line-height: 1.05;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--brand-ink);
      max-width: 18ch;
      margin-bottom: var(--space-4);
      opacity: 0;
      transform: translateY(14px);
    }

    /* Subline */
    .hero-sub {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--brand-ink-60);
      max-width: 38ch;
      line-height: 1.55;
      margin-bottom: var(--space-6);
      opacity: 0;
      transform: translateY(14px);
    }

    /* Hours band */
    .hours-band {
      width: 100vw;
      background: var(--brand-rose-soft);
      padding: var(--space-4) var(--space-6);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: clamp(0.875rem, 2vw, 1rem);
      color: var(--brand-ink);
      line-height: 1.5;
      margin-bottom: var(--space-8);
      opacity: 0;
    }

    /* CTA group */
    .hero-ctas {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      width: 100%;
      max-width: 320px;
      margin-bottom: var(--space-6);
      opacity: 0;
      transform: translateY(14px);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      min-height: 54px;
      background: var(--brand-amber);
      color: var(--brand-paper);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.0625rem;
      letter-spacing: 0.03em;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-md);
      transition: background 150ms ease-out, transform 150ms ease-out, box-shadow 150ms ease-out;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }

    .btn-primary:hover,
    .btn-primary:focus-visible {
      background: var(--brand-amber-deep);
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(240, 144, 24, 0.28);
    }

    .btn-primary:active { transform: scale(0.98); }

    .btn-primary:focus-visible {
      outline: 3px solid var(--brand-amber);
      outline-offset: 3px;
    }

    /* phone icon inline SVG */
    .icon-phone {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      background: transparent;
      color: var(--brand-ink);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.02em;
      border: 1.5px solid var(--brand-rose-deep);
      border-radius: var(--radius-pill);
      transition: background 150ms ease-out, transform 150ms ease-out, border-color 150ms ease-out;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-secondary:hover,
    .btn-secondary:focus-visible {
      background: var(--brand-rose-soft);
      border-color: var(--brand-rose);
      transform: scale(1.02);
    }

    .btn-secondary:active { transform: scale(0.98); }

    .btn-secondary:focus-visible {
      outline: 3px solid var(--brand-rose);
      outline-offset: 3px;
    }

    /* Trust line */
    .hero-trust {
      font-family: var(--font-body);
      font-size: 0.9375rem;
      color: var(--brand-ink-60);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      opacity: 0;
      transform: translateY(10px);
    }

    .hero-trust .stars {
      color: var(--brand-amber);
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    /* ─── Line-art divider ─── */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-8) var(--space-6) 0;
      opacity: 0;
      transform: translateY(10px);
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--brand-rose);
      opacity: 0.4;
    }

    /* Inline bread line-art SVG at center */
    .divider-motif {
      flex-shrink: 0;
      color: var(--brand-rose-deep);
    }

    /* ─── Photo grid (below the fold) ─── */
    .photo-section {
      padding: var(--space-8) var(--space-6) var(--space-12);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: var(--space-3);
      max-width: 560px;
      margin: 0 auto;
    }

    /* tall left photo spans 2 rows */
    .photo-item:first-child {
      grid-row: 1 / 3;
    }

    .photo-placeholder {
      background: linear-gradient(
        145deg,
        var(--brand-rose-soft) 0%,
        var(--brand-cream) 60%,
        var(--brand-amber-soft) 100%
      );
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      color: var(--brand-rose-deep);
      overflow: hidden;
      position: relative;
    }

    .photo-placeholder--tall { aspect-ratio: 3 / 5; }
    .photo-placeholder--square { aspect-ratio: 1 / 1; }

    .photo-placeholder-label {
      font-family: var(--font-body);
      font-size: var(--text-caption);
      color: var(--brand-rose-deep);
      opacity: 0.7;
      text-align: center;
      padding: var(--space-2);
    }

    /* Line-art icons inside placeholders */
    .placeholder-icon {
      width: 48px;
      height: 48px;
      opacity: 0.5;
    }

    /* scroll-reveal for photo cards */
    .photo-item {
      opacity: 0;
      transform: translateY(16px);
    }

    /* ─── Animation classes (added by JS) ─── */
    .is-visible {
      animation: fadeUp 400ms cubic-bezier(0.0, 0.0, 0.2, 1) forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hours band uses fade-only (no translateY — it's full-width) */
    .hours-band.is-visible {
      animation: fadeIn 380ms cubic-bezier(0.0, 0.0, 0.2, 1) forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ─── Reduced motion ─── */
    @media (prefers-reduced-motion: reduce) {
      .hero-logo,
      .hero-h1,
      .hero-sub,
      .hours-band,
      .hero-ctas,
      .hero-trust,
      .divider,
      .photo-item {
        opacity: 1 !important;
        transform: none !important;
        animation: none !important;
        transition: none !important;
      }

      .btn-primary:hover,
      .btn-primary:focus-visible,
      .btn-secondary:hover,
      .btn-secondary:focus-visible,
      .nav-cta:hover,
      .nav-cta:focus-visible {
        transform: none !important;
      }
    }

    /* ─── Desktop bump-ups ─── */
    @media (min-width: 640px) {
      .hero {
        padding-top: var(--space-16);
        padding-bottom: var(--space-12);
      }

      .hero-ctas {
        flex-direction: row;
        max-width: none;
        width: auto;
      }

      .btn-primary,
      .btn-secondary {
        width: auto;
        padding-left: var(--space-8);
        padding-right: var(--space-8);
      }
    }

    @media (min-width: 900px) {
      .photo-grid {
        max-width: 720px;
      }
    }
  </style>
</head>
<body>

  <!-- ─── Sticky nav ─── -->
  <header role="banner">
    <nav class="nav" aria-label="Main navigation">
      <img
        class="nav-logo"
        src="../assets/Logo_From_scratch.png"
        alt="From Scratch Bakeshop & Boba"
        width="44"
        height="44"
      >
      <ul class="nav-links" role="list">
        <li><a href="#menu">Menu</a></li>
        <li><a href="#story">Story</a></li>
        <li><a href="#visit">Visit</a></li>
        <li>
          <a class="nav-cta" href="tel:+18676869986" aria-label="Call to order: 867-686-9986">
            Order
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- ─── Hero ─── -->
  <main id="main">
    <section class="hero" aria-labelledby="hero-heading">

      <!-- Logo -->
      <img
        class="hero-logo js-anim"
        data-delay="0"
        src="../assets/Logo_From_scratch.png"
        alt="From Scratch Bakeshop & Boba — Yellowknife"
        width="150"
        height="150"
      >

      <!-- H1 — exactly one per page -->
      <h1 class="hero-h1 js-anim" data-delay="80" id="hero-heading">
        Open Today<br>in Yellowknife
      </h1>

      <!-- Subline -->
      <p class="hero-sub js-anim" data-delay="160">
        Shokupan · Banh Mì · Croissants · Bubble Tea · Coffee
      </p>

      <!-- Hours band — full-width, rose-soft -->
      <div class="hours-band js-anim hours-fade" data-delay="240" role="note" aria-label="Hours and location">
        Mon–Fri 10am–6pm &nbsp;·&nbsp; Sat–Sun 12–6pm &nbsp;·&nbsp; Centre Square Mall
      </div>

      <!-- CTAs -->
      <div class="hero-ctas js-anim" data-delay="320">
        <a
          class="btn-primary"
          href="tel:+18676869986"
          aria-label="Call to order — 867-686-9986"
        >
          <!-- Phone icon (single-stroke, brand line-art style) -->
          <svg class="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          Call to order
        </a>

        <a
          class="btn-secondary"
          href="#menu"
          aria-label="See the menu"
        >
          See the menu
        </a>
      </div>

      <!-- Trust signal -->
      <p class="hero-trust js-anim" data-delay="400" aria-label="4.9 stars, over 135 Google reviews">
        <span class="stars" aria-hidden="true">★★★★★</span>
        <span>4.9 &nbsp;·&nbsp; 135+ reviews</span>
      </p>

    </section>

    <!-- ─── Line-art divider ─── -->
    <div class="divider js-anim" data-delay="0" aria-hidden="true">
      <div class="divider-line"></div>
      <!-- Single-stroke bread motif -->
      <svg class="divider-motif" width="32" height="20" viewBox="0 0 32 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <!-- simple loaf silhouette: one continuous line -->
        <path d="M3 16 C3 12 6 4 10 3 C13 2 14 5 16 5 C18 5 19 2 22 3 C26 4 29 12 29 16 Z"/>
        <path d="M3 16 Q16 18 29 16"/>
        <!-- steam wisps -->
        <path d="M10 3 Q11 1 10 0"/>
        <path d="M16 5 Q17 3 16 1.5"/>
        <path d="M22 3 Q23 1 22 0"/>
      </svg>
      <div class="divider-line"></div>
    </div>

    <!-- ─── Photo grid (below fold) ─── -->
    <!-- replace with real IG photos (Q5) -->
    <section class="photo-section" id="menu" aria-label="Menu preview photos">
      <div class="photo-grid">

        <!-- Tall left: shokupan / bread feature -->
        <div class="photo-item js-scroll-reveal" data-delay="0">
          <div class="photo-placeholder photo-placeholder--tall" role="img" aria-label="Fresh shokupan from the oven — photo coming soon">
            <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <!-- loaf -->
              <path d="M8 36 C8 26 14 10 20 8 C22 7 23 11 24 11 C25 11 26 7 28 8 C34 10 40 26 40 36 Z"/>
              <path d="M8 36 Q24 39 40 36"/>
              <path d="M16 8 Q17 5 16 3"/>
              <path d="M24 11 Q25 8 24 6"/>
              <path d="M32 8 Q33 5 32 3"/>
            </svg>
            <span class="photo-placeholder-label">Shokupan · Fresh daily</span>
          </div>
        </div>

        <!-- Top right: boba -->
        <div class="photo-item js-scroll-reveal" data-delay="80">
          <div class="photo-placeholder photo-placeholder--square" role="img" aria-label="Bubble tea — photo coming soon">
            <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <!-- boba cup -->
              <path d="M16 10 L14 38 Q14 42 24 42 Q34 42 34 38 L32 10 Z"/>
              <line x1="16" y1="10" x2="32" y2="10"/>
              <!-- lid + straw -->
              <path d="M14 10 Q24 8 34 10"/>
              <line x1="24" y1="8" x2="24" y2="2"/>
              <!-- pearls -->
              <circle cx="20" cy="34" r="2"/>
              <circle cx="24" cy="36" r="2"/>
              <circle cx="28" cy="34" r="2"/>
            </svg>
            <span class="photo-placeholder-label">Bubble Tea</span>
          </div>
        </div>

        <!-- Bottom right: banh mi -->
        <div class="photo-item js-scroll-reveal" data-delay="160">
          <div class="photo-placeholder photo-placeholder--square" role="img" aria-label="Banh Mì — photo coming soon">
            <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <!-- banh mi baguette -->
              <path d="M8 26 Q8 18 24 16 Q40 18 40 26 Q40 34 24 36 Q8 34 8 26 Z"/>
              <!-- score lines -->
              <path d="M16 19 L14 33"/>
              <path d="M24 17 L24 35"/>
              <path d="M32 19 L34 33"/>
              <!-- filling peek -->
              <path d="M12 26 Q24 22 36 26"/>
            </svg>
            <span class="photo-placeholder-label">Banh Mì</span>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- ─── Animation script ─── -->
  <script>
    (function () {
      // Respect prefers-reduced-motion — bail early if so
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) return;

      // Hero elements: staggered fade-up on load
      const heroItems = document.querySelectorAll('.js-anim');
      heroItems.forEach(function (el) {
        const delay = parseInt(el.dataset.delay || '0', 10);
        const isHoursBand = el.classList.contains('hours-fade');

        requestAnimationFrame(function () {
          setTimeout(function () {
            if (isHoursBand) {
              el.style.animation = 'fadeIn 380ms cubic-bezier(0.0, 0.0, 0.2, 1) forwards';
            } else {
              el.style.animation = 'fadeUp 400ms cubic-bezier(0.0, 0.0, 0.2, 1) forwards';
            }
          }, delay + 120); // 120ms base offset so first paint is clean
        });
      });

      // Scroll-reveal for photo grid
      var scrollItems = document.querySelectorAll('.js-scroll-reveal');

      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              var el = entry.target;
              var delay = parseInt(el.dataset.delay || '0', 10);
              setTimeout(function () {
                el.style.animation = 'fadeUp 400ms cubic-bezier(0.0, 0.0, 0.2, 1) forwards';
              }, delay);
              observer.unobserve(el);
            }
          });
        }, { threshold: 0.15 });

        scrollItems.forEach(function (el) { observer.observe(el); });
      } else {
        // Fallback: show immediately
        scrollItems.forEach(function (el) {
          el.style.opacity = '1';
          el.style.transform = 'none';
        });
      }
    })();
  </script>

</body>
</html>
